services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - /app/.next
      - ./uploads:/app/uploads
    ports:
      - "3005:3005"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-velumina}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-velumina}
      - POSTGRES_DB=${POSTGRES_DB:-velumina}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_TRUST_HOST=${AUTH_TRUST_HOST:-true}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3005}
      - UPLOAD_DIR=/app/uploads
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL}
      - CRON_SECRET=${CRON_SECRET}
      - NODE_ENV=development
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-velumina}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-velumina}
      POSTGRES_DB: ${POSTGRES_DB:-velumina}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-velumina}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/config.json
    environment:
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_STOPPED=false
      - WATCHTOWER_LABEL_ENABLE=false
      - DOCKER_API_VERSION=1.52
    restart: unless-stopped

volumes:
  postgres_data:
