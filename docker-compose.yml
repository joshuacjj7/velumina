services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - /app/.next
      - ./uploads:/app/uploads
    ports:
      - "3005:3005"
    environment:
      - RESEND_API_KEY=${RESEND_API_KEY}
      - DATABASE_URL=postgresql://velumina:velumina@db:5432/velumina
      - NODE_ENV=development
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: velumina
      POSTGRES_PASSWORD: velumina
      POSTGRES_DB: velumina
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U velumina"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/config.json
    environment:
      - WATCHTOWER_POLL_INTERVAL=300        # check every 5 minutes
      - WATCHTOWER_CLEANUP=true             # remove old images automatically
      - WATCHTOWER_INCLUDE_STOPPED=false
      - WATCHTOWER_LABEL_ENABLE=false
      - DOCKER_API_VERSION=1.52       # watch all containers
    restart: unless-stopped

volumes:
  postgres_data:


