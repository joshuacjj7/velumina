services:
  app:
    image: ghcr.io/joshuacjj7/velumina:latest
    ports:
      - "3005:3005"
    volumes:
      - ${UPLOADS_DIR:-./uploads}:/app/uploads
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-velumina}:${POSTGRES_PASSWORD:-your_secure_password}@db:5432/${POSTGRES_DB:-velumina}
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-velumina}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-your_secure_password}
      POSTGRES_DB: ${POSTGRES_DB:-velumina}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-velumina}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/config.json
    environment:
      - WATCHTOWER_POLL_INTERVAL=300        # check every 5 minutes
      - WATCHTOWER_CLEANUP=true             # remove old images automatically
      - WATCHTOWER_INCLUDE_STOPPED=false
      - WATCHTOWER_LABEL_ENABLE=false       # watch all containers
    restart: unless-stopped

volumes:
  postgres_data:
